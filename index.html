<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Aswin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
            position: relative;
        }

        /* Animated gradient background */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #000000, #1a0a00, #ff6600, #000000);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particle container */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff6600;
            border-radius: 50%;
            opacity: 0;
            animation: float 8s infinite ease-in-out;
            box-shadow: 0 0 10px #ff6600;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* Main content */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
        }

        .content {
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 8vw;
            font-weight: bold;
            color: #ff6600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            animation: glow 2s ease-in-out infinite alternate, slideIn 1.5s ease-out;
            text-shadow:
                0 0 10px #ff6600,
                0 0 20px #ff6600,
                0 0 30px #ff6600,
                0 0 40px #ff8833,
                0 0 70px #ff8833,
                0 0 80px #ff8833,
                0 0 100px #ff8833;
        }

        @keyframes glow {
            from {
                text-shadow:
                    0 0 10px #ff6600,
                    0 0 20px #ff6600,
                    0 0 30px #ff6600,
                    0 0 40px #ff8833,
                    0 0 70px #ff8833,
                    0 0 80px #ff8833,
                    0 0 100px #ff8833;
            }
            to {
                text-shadow:
                    0 0 20px #ff6600,
                    0 0 30px #ff8833,
                    0 0 40px #ff8833,
                    0 0 50px #ff9944,
                    0 0 80px #ff9944,
                    0 0 90px #ff9944,
                    0 0 120px #ff9944;
            }
        }

        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateY(-100px) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Circular rings animation */
        .rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            z-index: 2;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #ff6600;
            border-radius: 50%;
            opacity: 0;
            animation: ripple 3s infinite ease-out;
        }

        .ring:nth-child(1) {
            animation-delay: 0s;
        }

        .ring:nth-child(2) {
            animation-delay: 1s;
        }

        .ring:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes ripple {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
            }
            100% {
                width: 600px;
                height: 600px;
                opacity: 0;
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            h1 {
                font-size: 12vw;
            }
        }

        /* Corner decorations */
        .corner {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid #ff6600;
            z-index: 4;
            animation: cornerPulse 3s infinite ease-in-out;
        }

        .corner.top-left {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }

        @keyframes cornerPulse {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="background"></div>

    <!-- Particle system -->
    <div class="particles" id="particles"></div>

    <!-- Ripple rings -->
    <div class="rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <!-- Corner decorations -->
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>

    <!-- Main content -->
    <div class="container">
        <div class="content">
            <h1>Hello Aswin</h1>
        </div>
    </div>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 50;

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';

            // Random position
            particle.style.left = Math.random() * 100 + '%';

            // Random delay and duration
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 6) + 's';

            // Random size
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';

            particlesContainer.appendChild(particle);
        }

        // Generate particles
        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        // Add mouse interaction
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            // Create temporary glow effect
            const glow = document.createElement('div');
            glow.style.position = 'absolute';
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';
            glow.style.width = '10px';
            glow.style.height = '10px';
            glow.style.background = '#ff6600';
            glow.style.borderRadius = '50%';
            glow.style.pointerEvents = 'none';
            glow.style.zIndex = '10';
            glow.style.boxShadow = '0 0 20px #ff6600';
            glow.style.animation = 'fadeOut 1s ease-out forwards';

            document.body.appendChild(glow);

            setTimeout(() => {
                glow.remove();
            }, 1000);
        });

        // Fade out animation for mouse trail
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                to {
                    opacity: 0;
                    transform: scale(3);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
