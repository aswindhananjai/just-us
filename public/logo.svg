<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners and blue gradient -->
  <rect width="512" height="512" rx="115" fill="url(#gradient)"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#014F86"/>
      <stop offset="100%" stop-color="#0169b3"/>
    </linearGradient>
  </defs>

  <!-- Stylized "A" - smooth arc/loop design inspired by the image -->
  <path d="M256 100 C200 100, 150 150, 150 220 C150 290, 180 360, 256 400 C332 360, 362 290, 362 220 C362 150, 312 100, 256 100 Z"
        fill="none"
        stroke="white"
        stroke-width="55"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Inner cutout to create the "A" shape -->
  <ellipse cx="256" cy="240" rx="65" ry="100" fill="url(#gradient)"/>
</svg>
